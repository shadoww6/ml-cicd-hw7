version: '3.8'

services:
  ml-service-blue:
    build: .
    image: ml-service:v1.0.0
    container_name: ml-blue
    environment:
      - VERSION=v1.0.0
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
