name: Model Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install scikit-learn numpy pandas -q

      - name: Build Docker image
        run: |
          docker build -t ml-service:${{ github.sha }} .
          echo "Образ собран: ml-service:${{ github.sha }}"

      - name: Health check simulation
        run: |
          echo "Deployment simulation complete"
          echo "В продакшене здесь был бы запрос:"
          echo "curl https://your-app/health"
          echo "curl https://your-app/predict -d '{\"x\": [1,2,3]}'"
          echo "Ожидаемый ответ: {\"status\": \"ok\", \"version\": \"v1.1.0\"}"
