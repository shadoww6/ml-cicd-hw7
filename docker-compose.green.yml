version: '3.8'

services:
  ml-service-green:
    build: .
    image: ml-service:v1.1.0
    container_name: ml-green
    environment:
      - VERSION=v1.1.0
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
